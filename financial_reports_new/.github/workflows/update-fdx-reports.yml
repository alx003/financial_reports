name: Update FDX financial reports

on:
  schedule:
    # Every Monday at 12:00 UTC. SEC XBRL data updates in near-real-time as
    # filings are disseminated, so a weekly cadence is enough to catch new
    # 10-K/10-Q filings without hammering the API.
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/run_pipeline.py --config config/pipeline.yml

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs dataset
          git diff --cached --quiet || git commit -m "Auto-update financial statement data [skip ci]"
          git push
